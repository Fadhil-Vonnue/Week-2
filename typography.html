<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap");
      html {
        font-size: 62.5%;
      }
      .p1 {
        font-family: "Google Sans Flex", sans-serif;
        font-size: 1.2rem;
        font-display: swap;
      }
      .p2 {
        font-family: "Google Sans Flex", sans-serif;
        font-size: 1.4rem;
        font-display: swap;
      }
      .p3 {
        font-family: "Google Sans Flex", sans-serif;
        font-size: 1.6rem;
        font-display: swap;
      }
      .p4 {
        font-family: "Google Sans Flex", sans-serif;
        font-size: 1.8rem;
        font-display: swap;
        font-weight: 300;
      }
      .p5 {
        font-family: "Google Sans Flex", sans-serif;
        font-size: 2rem;
        font-display: swap;
        font-weight: 400;
      }
      .p6 {
        font-family: "Google Sans Flex", sans-serif;
        font-size: 2.2rem;
        font-display: swap;
        font-weight: 500;
      }
      .p7 {
        font-family: "Google Sans Flex", sans-serif;
        font-size: 2.4rem;
        font-display: swap;
        font-weight: 600;
      }
      .p8 {
        font-family: "Google Sans Flex", sans-serif;
        font-size: 3rem;
        font-display: swap;
        font-weight: 700;
      }
      .p9 {
        font-family: "Google Sans Flex", sans-serif;
        font-size: 4rem;
        font-display: swap;
        font-weight: 1000;
        font-synthesis: weight;
      }
      .p10 {
        font-family: "Google Sans Flex", sans-serif;
        font-size: 6rem;
        font-display: swap;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: "Noto Serif", serif;
        font-display: swap;
      }
      div{
        letter-spacing:20px ;
        line-height: 1.5;
        width: 300px;
      }
      p{
        text-overflow: ellipsis;
        overflow: hidden;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>THIS IS THE TYPOGRAPHY TYPE SCALE</h1>
      <div>
      <p class="p1">This is para 1</p>
      <p class="p2">This is para 2</p>
      <p class="p3">This is para 3</p>
      <p class="p4">This is para 4</p>
      <p class="p5">This is para 5</p>
      <p class="p6">This is para 6</p>
      <p class="p7">This is para 7</p>
      <p class="p8">This is para 8</p>
      <p class="p9">This is para 9</p>
      <p class="p10">This is para 10</p>
      </div>
    </main>
  </body>
</html>
