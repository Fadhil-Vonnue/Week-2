<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --color-primary: #171717;
        --color-primary-rgb: rgb(23, 23, 23);
        --color-primary-hsl: hsl(0, 0%, 9%);
        --color-primary-hex: #171717;
        --color-primary-oklch: oklch(20.463% 0.00002 271.152);
        --color-secondary: white;
        --color-accent: wheat;
        --color-success: green;
        --color-warning: orange;
        --color-error: red;
        --color-text: black;
        --color-bg: rgb(255, 255, 255);
      }
      * {
        margin: 0;
        padding: 0;
      }
      .container {
        display: grid;
        grid-template-columns: auto 1fr;
        grid-template-areas:
          "header header "
          "sidebar content";
      }

      header {
        display: flex;
        padding: 10px 15px;
        align-items: center;
        height: 6vh;
        background-color: var(--color-primary);
        color: var(--color-secondary);
        grid-area: header;
      }
      h1 {
        font-size: 25px;
      }
      .sidebar {
        width: 240px;
        grid-area: sidebar;
        background-color: #171717;
        color: var(--color-accent);
        padding: 20px;
        box-sizing: border-box;
      }
      .stats {
        grid-area: content;
      }
      .sidebar {
        grid-area: sidebar;
      }
      a {
        color: var(--color-secondary);
        font-family: sans-serif;
        text-decoration: none;
        font-size: 10px;
        font-weight: bold;
      }
      .icon {
        display: flex;
        width: auto;
        justify-content: center;
        align-items: center;
        width: 35px;
        border: 1px solid var(--color-text);
        border-radius: 50%;
        padding: 5px;
      }
      .stats {
        padding: 10px;
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(4, 1fr);
        grid-template-areas: "card1 card2 card3 card4"
        "chart chart chart chart"
        "panel1 panel1 panel2 panel2"
        ;
      }
      .card {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 10px 20px;
        border: 1px solid rgba(128, 128, 128, 0.479);
        border-radius: 10px;
      }
      .chart {
        padding: 10px;
        border: 1px solid rgba(128, 128, 128, 0.479);
        border-radius: 10px;
        grid-column: span 4;
        grid-row: span 2;
      }
      .panel {
        grid-column: span 2;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 1px solid rgba(128, 128, 128, 0.562);
        border-radius: 10px;
        height: 150px;
      }
      .icons {
        display: none;
        color: blanchedalmond;
      }
      .card1 {
        grid-area: card1;
        grid-area: card2;
      }
      .card2 {
        grid-area: card2;
      }
      .card3 {
        grid-area: card3;
      }
      .card2 {
        grid-area: card4;
      }
      .chart{
            grid-area: chart;
        }
      .p1 {
        grid-area: panel1;
      }
      .p2 {
        grid-area: panel2;
      }
      @media screen and (width<=1024px) {
        .sidebar {
          width: 60px;
        }
        .sidebar a,
        h2 {
          display: none;
        }
        .icons {
          display: block;
        }
      }
      @media screen and (width<=768px) {
        .container {
          grid-template-columns: 1fr;
          grid-template-areas:
            "header "
            "content"
            "sidebar";
        }
        .sidebar {
          width: 100%;
        }
        .sidebar a,
        h2 {
          display: block;
        }
        .icons {
          display: none;
        }
        .stats{
            grid-template-columns: 1fr;
            grid-template-areas: "card1"
            "card2"
            "card3"
            "card4"
            "chart"
            "panel1"
            "panel2";
        }
      }
    </style>
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Admin Dashboard</h1>
      </header>
      <aside class="sidebar">
        <section>
          <span class="icons">M</span>
          <h2>Menu</h2>
          <hr />
          <br />
          <span class="icons">D</span>
          <a href="#">Dashboard</a><br /><br />
          <span class="icons">P</span>
          <a href="#">Profile</a><br /><br />
          <span class="icons">R</span>
          <a href="#">Reports</a><br /><br />
        </section>
      </aside>
      <div class="stats">
        <div class="card card1">
          <div class="icon">
            <img
              width="35px"
              src="https://img.icons8.com/?size=100&id=udjU_YS4lMXL&format=png&color=000000"
              alt=""
            />
          </div>
          <br />
          <h2>8h 34m</h2>
          <hr />
          <p>Code Time</p>
        </div>
        <div class="card card2">
          <div class="icon">
            <img
              width="35px"
              src="https://img.icons8.com/?size=100&id=udjU_YS4lMXL&format=png&color=000000"
              alt=""
            />
          </div>
          <br />
          <h2>6h 34m</h2>
          <hr />
          <p>Active Code Time</p>
        </div>
        <div class="card card3">
          <div class="icon">
            <img
              width="35px"
              src="https://img.icons8.com/?size=100&id=udjU_YS4lMXL&format=png&color=000000"
              alt=""
            />
          </div>
          <br />
          <h2>91 %</h2>
          <hr />
          <p>Average Productivity</p>
        </div>
        <div class="card card4">
          <div class="icon">
            <img
              width="35px"
              src="https://img.icons8.com/?size=100&id=udjU_YS4lMXL&format=png&color=000000"
              alt=""
            />
          </div>
          <br />
          <h2>27.27 WPM</h2>
          <hr />
          <p>Average Typing Speed</p>
        </div>
        <div class="chart">
          <h2>User Productivity</h2>
          <hr />
          <br />
          <img
            height="300px"
            width="100%"
            src="https://mba.hitbullseye.com/sites/default/files/circle-graph-4.png"
            alt=""
          />
        </div>
        <div class="panel p1">THIS IS A PANEL</div>
        <div class="panel p2">THIS IS A PANEL</div>
      </div>
    </div>
  </body>
</html>
