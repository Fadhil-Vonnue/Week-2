<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      .container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 5px;
        border: 4px dotted red;
        padding: 5px;
      }
      .box {
        border: 1px solid grey;
      }
      .b1 {
        grid-row-start: 1;
        grid-column-start: 3;
        /* grid-column: 3/5; */
        grid-row: 1/3;
      }
      .b2 {
        grid-row-start: 1;
        grid-column-start: 1;
        grid-column: 1/3;
      }
      .b3 {
        grid-row-start: 2;
        grid-column-end: -1;
        grid-row: span 3;
      }
      .b4 {
        grid-row-end: -1;
        grid-column-end: -1;
      }
      .b5 {
        grid-row-end: -2;
        grid-column-start: 1;
      }
      .b6 {
        grid-column-start: 3;
        grid-row-start: 3;
        grid-column: span 2;
      }
      .b7 {
        grid-column-start: 2;
        grid-row-end: -1;
        grid-column: span 3;
      }
      .b8 {
        grid-row-start: 2;
        grid-column-start: 2;
        grid-column: 1/3;
      }
      .container1 {
        display: grid;
        grid-template-columns: auto auto auto auto;
        grid-template-rows: auto auto auto auto;
        gap: 5px;
        border: 4px dotted red;
        padding: 5px;
      }
      .b {
        grid-column: 1 / -1;
      }
      .dense {
        display: grid;
        grid-template-columns: auto auto auto;
        grid-template-rows: auto auto;
        gap: 10px;
        padding: 10px;
        border: 4px dotted red;
        grid-auto-flow: row dense;
      }
      .bo3 {
        grid-column: span 2;
      }
    </style>
    <title>Document</title>
  </head>
  <body>
    <h1>CSS GRIDS</h1>
    <h2>Manual placing</h2>
    <div class="container">
      <div class="box b1">Box 1</div>
      <div class="box b2">Box 2</div>
      <div class="box b3">Box 3</div>
      <div class="box b4">Box 4</div>
      <div class="box b5">Box 5</div>
      <div class="box b6">Box 6</div>
      <div class="box b7">Box 7</div>
      <div class="box b8">Box 8</div>
    </div>
    <br /><br />
    <h2>Negative lines</h2>
    <div class="container1">
      <div class="box b">Box 1</div>
      <div class="box b">Box 2</div>
      <div class="box b">Box 3</div>
      <div class="box b">Box 4</div>
    </div>
    <br /><br />
    <h2>Dense Packing</h2>
    <div class="dense">
      <div class="box bo1">Box 1</div>
      <div class="box bo2">Box 2</div>
      <div class="box bo3">Box 3</div>
      <div class="box bo4">Box 4</div>
    </div>
  </body>
</html>
