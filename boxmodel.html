<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            width: 200px;
            height: 100px;
            background-color: aqua;
            padding: 10px;
            margin: 12px;
        }
        .box2{
            width: 200px;
            height: 100px;
            background-color: aquamarine;
            padding: 15px;
            margin: 10px;
        }
        .box3{
            width: 300px;
            box-sizing: content-box;
            height: 100px;
            background-color: rgb(43, 7, 112);
            padding: 20px;
            margin: 15px;
        }
        .box4{
            width: 300px;
            box-sizing: border-box;
            height: 100px;
            background-color: darkseagreen;
            padding: 20px;
            margin: 15px;
        }
        .box5{
            width: 200px;
            height: 100px;
            padding: 4px;
            margin: 4px;
            background-color: deepskyblue;
        }
        .box6{
            width: 200px;
            height: 100px;
            padding: 5px;
            margin: -5px;
            background-color: greenyellow;
        }
        .box7{
             width: 200px;
            height: 100px;
            padding: 25px;
            margin: 25px;
            background-color: grey;
        }
        .box8{
            width: 200px;
            height: 100px;
            padding: 25px;
            margin: -45px;
            background-color: darksalmon;
        }

    </style>
</head>
<body>
    <main>
        <div class="box1">sfds</div>
        <div class="box2">sfds</div>
        <div class="box3">sfds</div>
        <div class="box4">ss</div>
        <div class="box5">ss</div>
        <div class="box6">ss</div>
        <div class="box7">ss</div>
        <div class="box8">ss</div>
    </main>
</body>
</html>
