<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      header {
        display: flex;
        padding: 10px 15px;
        align-items: center;
        height: 6vh;
        background-color: #171717;
        color: white;
        grid-area: header;
      }
      nav {
        background-color: #171717;
        padding: 10px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 10px;
        text-align: center;
        height: 100%;
      }
      nav h2 {
        color: blanchedalmond;
      }
      a {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      nav span {
        color: wheat;
        display: none;
        font-size: 20px;
      }
      .container {
        display: flex;
        height: 94vh;
      }
      .content {
        display: grid;
        grid-template-columns: 1fr;
        width: 100%;
        gap: 10px;
        height: 100%;
      }
      .box {
        padding: 10px;
        border: 1px solid black;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .secondary{
        display: none;
      }
      @media screen and (min-width:480px) {
        nav span {
          display: inline-block;
        }
      }
      @media screen and (min-width:600px) {
        .content {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media screen and (min-width:768px) {
        nav span {
          display: inline-block;
        }
        .container {
          flex-direction: column;
        }
        nav {
          flex-direction: row;
          height: auto;
        }
      }
      @media screen and (min-width:900px) {
        .content {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media screen and (min-width:1024px) {
        .secondary{
            display: flex;
        }
      }
      @media screen and (min-width:1280px) {
        .content {
          grid-template-columns: repeat(4, 1fr);
        }
      }
    </style>
    <title>Document</title>
  </head>
