<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        * .box{
            background-color: darkslategray;
        }
         /* specificity score - (0,1,0) */
        main > div{
            background-color: darkturquoise;
        }
        /* specificity score - (0,0,2) */
      .box {
        background-color: yellow;
      }
      /* specificity score - (0,1,0) */
      #box {
        background-color: red;
      }
      /* specificity score - (1,0,0) */
      div {
        background-color: blue !important;
      }
      /* specificity score - (1,0,0,0,1) */
      div:nth-child(2){
        background-color: green;
      }
      /* specificity score - (0,1,1) */
      [data-style="box"]{
        background-color: brown;
      }
      /* specificity score - (0,1,0) */
      main div{
        background-color: dodgerblue;
      }
      main div:nth-child(2){
        background-color: green;
      }
      /* specificity score - (0,1,2) */
    main div.box{
        background-color: blueviolet;
    }
    /* specificity score - (0,1,2) */
    main .box{
        background-color: gold;
    }
    /* specificity score - (0,1,1) */
    :is(div){
        background-color: bisque;
    }
    /* specificity score - (0,0,1) */
    h1 + div{
        color: indigo;
    }
    /* specificity score - (0,0,2) */
    h1 + div.box{
      color: indianred;
    }
    /* specificity score - (0,1,2) */
    </style>
  </head>
  <body>
    <main>
        <h1>SPECIFICITY</h1>
      <div style="background-color: aqua;" id="box" data-style="box" class="box">HELOOOOOOO</div>
      <!-- specificity(1,0,0) -->
    </main>
  </body>
</html>
