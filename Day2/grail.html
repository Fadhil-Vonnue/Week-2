<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .parent {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
      }
      header {
        position: sticky;
        z-index: 100;
        top: 0;
        height: 9vh;
        background-color: rgb(18, 18, 131);
        display: flex;
        align-items: center;
        box-sizing: border-box;
        padding: 30px;
      }
      nav {
        display: flex;
        justify-content: center;
        gap: 15px;
      }
      nav a {
        color: white;
        font-family: sans-serif;
        text-decoration: none;
        font-size: 30px;
        font-weight: bold;
      }
      nav a:focus-visible {
        background-color: pink;
      }
      nav a:hover {
        color: pink;
      }
      .logo img {
        border-radius: 50%;
      }
      .left {
        display: flex;
        gap: 20px;
      }
      .login {
        width: 110px;
        height: 45px;
        border-radius: 10px;
        background-color: green;
        font-family: sans-serif;
        color: white;
        font-weight: bolder;
        font-size: 13px;
        padding: 5px;
        box-sizing: border-box;
      }
      .login:hover {
        background-color: rgb(185, 17, 17);
      }
      .middle {
        display: flex;
        max-width: 100vw;
        flex-grow: 1;
      }
      .sidebar {
        width: 250px;
        box-sizing: border-box;
        background-color: rgb(255, 255, 255);
        border-right: 1px solid rgba(128, 128, 128, 0.315);
        display: flex;
        flex-direction: column;
        padding: 10px;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      footer {
        height: 20vh;
        width: 100vw;
        background-color: #888888;
        text-align: center;
      }
      .aside {
        width: 250px;
        background-color: rgb(255, 255, 255);
        border-left: 1px solid rgba(128, 128, 128, 0.315);
        flex-shrink: 0;
      }
      .content {
        background-color: rgb(255, 255, 255);
        flex-grow: 1;
        text-align: center;
      }
      .bar1 {
        display: flex;
        width: 220px;
        height: 50px;
        align-items: center;
        gap: 15px;
        padding: 5px;
        box-sizing: border-box;
        border-bottom: 1px solid rgba(128, 128, 128, 0.315);
      }
      @media screen and (width <= 600px) {
        .middle{
            flex-direction: column;
        }
        .content{
            order: -1;
            border: 1px solid rgba(128, 128, 128, 0.315);

        }
        .aside{
            padding: 5px;
            border: 1px solid rgba(128, 128, 128, 0.315);
            box-sizing: border-box;
        }
        .sidebar{
            border: 1px solid rgba(128, 128, 128, 0.315);
            
        }
      }
    </style>
  </head>
